<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Zero Waste Kitchen</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300..600;1,9..40,300..400&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F2EC;--bgw:#F0E8DD;--bgd:#E8DCCB;--card:#FFFFFF;--cardh:#FFFCF8;--ac:#B85C38;--ach:#A04E2E;--acl:#D4956A;--acp:rgba(184,92,56,.08);--acp2:rgba(184,92,56,.15);--tx:#2C1810;--tx2:#6B5344;--mu:#9C8878;--bd:#E0D3C4;--bd2:#C9A882;--ok:#5A7247;--okp:rgba(90,114,71,.1);--ng:#B5392B;--hf:#3D2B1F;--ht:#6B4226;--htx:#FFF5EC;--ss:0 1px 3px rgba(44,24,16,.04);--sm:0 4px 16px rgba(44,24,16,.06);--fd:'Cormorant Garamond',serif;--fb:'DM Sans',sans-serif}
.dark{--bg:#18120E;--bgw:#211A14;--bgd:#2A211A;--card:#2A211A;--cardh:#332A20;--ac:#D4956A;--ach:#E0A87E;--acl:#E8B88A;--acp:rgba(212,149,106,.1);--acp2:rgba(212,149,106,.18);--tx:#F0E4D4;--tx2:#B8A898;--mu:#8A7868;--bd:#3A2F24;--bd2:#5C4A38;--ok:#7BA362;--okp:rgba(123,163,98,.12);--ng:#E07060;--hf:#1A1210;--ht:#2A1F16;--htx:#F0E4D4;--ss:0 1px 3px rgba(0,0,0,.12);--sm:0 4px 16px rgba(0,0,0,.16)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);overflow-x:hidden;min-height:100vh;transition:background .4s,color .4s;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 20%,rgba(184,92,56,.06) 0%,transparent 55%),radial-gradient(ellipse at 85% 80%,rgba(90,114,71,.04) 0%,transparent 55%);pointer-events:none;z-index:0}
input:focus{outline:none}
button{-webkit-appearance:none;font-family:var(--fb);cursor:pointer;border:none;background:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes wiggle{0%,100%{transform:rotate(-6deg) scale(1)}50%{transform:rotate(6deg) scale(1.08)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}

.header{background:linear-gradient(135deg,var(--hf),var(--ht));padding:40px 32px 36px;text-align:center;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.03;mix-blend-mode:overlay;pointer-events:none}
.hi{position:relative;z-index:2}
.hi-icon{font-size:44px;margin-bottom:6px;display:block}
.header h1{font-family:var(--fd);font-size:32px;font-weight:700;color:var(--htx);letter-spacing:-.02em;margin:4px 0 6px}
.hi-sub{color:rgba(255,245,236,.55);font-size:14px;font-weight:300;letter-spacing:.03em}
.ha{position:absolute;top:20px;right:20px;left:20px;display:flex;justify-content:space-between;z-index:3}
.hb{padding:7px 13px;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);border-radius:10px;font-size:14px;color:var(--htx);transition:background .2s}
.hb:hover{background:rgba(255,255,255,.18)}
.ap{display:inline-flex;align-items:center;gap:8px;margin-top:14px;padding:8px 20px;background:rgba(255,255,255,.1);backdrop-filter:blur(6px);border-radius:50px;font-size:13px;color:var(--htx);cursor:pointer;transition:background .2s;border:1px solid rgba(255,255,255,.08)}
.ap:hover{background:rgba(255,255,255,.18)}
.ap.ok{background:rgba(90,114,71,.25);border-color:rgba(90,114,71,.3)}

.main{max-width:1100px;margin:0 auto;padding:28px 24px 60px;position:relative;z-index:1}
.lay{display:grid;grid-template-columns:1fr;gap:28px}
@media(min-width:860px){.lay{grid-template-columns:380px 1fr;gap:36px;align-items:start}.cl{position:sticky;top:24px;max-height:calc(100vh - 48px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bd) transparent;padding-right:4px}.cl::-webkit-scrollbar{width:4px}.cl::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}}

.st{font-family:var(--fd);font-size:20px;font-weight:700;margin-bottom:14px;letter-spacing:-.01em}
.sl{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:10px}

.cs{background:var(--card);border:1px solid var(--bd);border-radius:20px;margin-bottom:20px;overflow:hidden;box-shadow:var(--ss);transition:box-shadow .3s}
.cs:hover{box-shadow:var(--sm)}
.ch{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;transition:background .2s;user-select:none}
.ch:hover{background:var(--cardh)}
.chl{display:flex;align-items:center;gap:10px}
.ch h3{font-family:var(--fd);font-size:17px;font-weight:700;margin:0}
.ch .su{font-size:12px;color:var(--ac);font-weight:600}
.ch .ar{font-size:12px;color:var(--mu);transition:transform .3s cubic-bezier(.16,1,.3,1)}
.ch .ar.op{transform:rotate(180deg)}
.cb{padding:0 20px 20px;border-top:1px solid var(--bd)}

.ir{display:flex;gap:8px;margin-bottom:16px}
.ir input{flex:1;padding:12px 16px;border:1.5px solid var(--bd);border-radius:14px;font-size:14px;font-family:var(--fb);background:var(--bg);color:var(--tx);transition:border-color .2s,box-shadow .2s}
.ir input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acp)}
.ir input::placeholder{color:var(--mu)}
.ba{padding:12px 18px;background:var(--ac);color:#fff;font-weight:600;font-size:14px;border-radius:14px;transition:background .2s,transform .15s;white-space:nowrap}
.ba:hover{background:var(--ach)}
.ba:active{transform:scale(.97)}

.qg{display:flex;flex-wrap:wrap;gap:6px}
.qc{padding:6px 12px;font-size:12.5px;background:var(--bgw);color:var(--tx2);border:1px solid var(--bd);border-radius:50px;transition:all .2s}
.qc:hover{border-color:var(--ac);color:var(--ac);background:var(--acp)}

.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.tag{display:inline-flex;align-items:center;gap:6px;background:var(--acp2);border:1px solid var(--bd2);border-radius:50px;padding:6px 10px 6px 14px;font-size:13px;animation:fadeUp .3s ease both}
.tq{padding:2px 8px;font-size:11px;border-radius:8px;background:var(--bgw);color:var(--mu);border:1px dashed var(--bd);transition:all .2s}
.tq.has{background:var(--bgd);color:var(--tx2);border-style:solid}
.tx{padding:1px 5px;color:var(--mu);font-size:16px;line-height:1;border-radius:50%}
.tx:hover{color:var(--ng);background:rgba(181,57,43,.08)}
.tag input{width:60px;padding:2px 6px;border:1px solid var(--bd);border-radius:6px;font-size:11px;font-family:inherit;background:var(--card);color:var(--tx)}
.bc{padding:6px 12px;font-size:11px;background:rgba(181,57,43,.06);color:var(--ng);border-radius:50px;border:1px solid rgba(181,57,43,.12)}

.cg{display:flex;flex-wrap:wrap;gap:6px}
.cp{padding:8px 14px;font-size:12.5px;border-radius:50px;transition:all .2s;background:var(--bg);color:var(--tx2);border:1px solid var(--bd)}
.cp:hover{border-color:var(--bd2);color:var(--tx)}
.cp.on{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}
.ct{display:flex;flex-direction:column;align-items:center;padding:8px 14px;gap:1px}
.ct .sub{font-size:9.5px;opacity:.6}
.ng{display:flex;gap:6px}
.nb{width:40px;height:40px;border-radius:10px;font-size:14px;font-weight:600;transition:all .2s;background:var(--bg);color:var(--tx2);border:1px solid var(--bd)}
.nb.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.tg{width:42px;height:24px;border-radius:12px;position:relative;transition:background .2s;background:var(--bd)}
.tg.on{background:var(--ac)}
.tk{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.tg.on .tk{left:21px}
.tc{display:flex;gap:16px;flex-wrap:wrap}.tc>div{flex:1;min-width:140px}
.pg{margin-bottom:18px}.pg:last-child{margin-bottom:0}

.gb{width:100%;padding:16px 24px;font-family:var(--fd);font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--hf),var(--ht));color:var(--htx);border-radius:14px;transition:all .2s;box-shadow:0 4px 20px rgba(61,43,31,.25)}
.gb:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 28px rgba(61,43,31,.3)}
.gb:disabled{background:var(--bgd);color:var(--mu);box-shadow:none;cursor:not-allowed}

.lw{text-align:center;padding:60px 20px;animation:fadeUp .4s ease}
.lw .ico{font-size:52px;animation:wiggle .8s ease-in-out infinite;margin-bottom:14px}
.lw h3{font-family:var(--fd);font-size:22px;margin-bottom:6px}
.lw p{color:var(--mu);font-size:13.5px;margin-bottom:20px}
.dots{display:flex;justify-content:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--acl)}
.dot:nth-child(1){animation:pulse 1.2s 0s infinite}.dot:nth-child(2){animation:pulse 1.2s .2s infinite}.dot:nth-child(3){animation:pulse 1.2s .4s infinite}

.eb{padding:16px;background:rgba(181,57,43,.06);border:1px solid rgba(181,57,43,.15);border-radius:14px;color:var(--ng);font-size:13.5px;text-align:center;margin-bottom:20px}

.ws{padding:28px;background:var(--card);border:1px solid var(--bd);border-radius:20px;margin-bottom:20px;text-align:center;box-shadow:var(--ss);animation:fadeUp .5s ease both}
.wb{font-family:var(--fd);font-size:48px;font-weight:700;margin:6px 0}
.wt{height:5px;background:var(--bgw);border-radius:4px;overflow:hidden;max-width:200px;margin:0 auto 8px}
.wf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ok),#7BA362);transition:width .8s cubic-bezier(.16,1,.3,1)}

.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.rt{font-family:var(--fd);font-size:24px;font-weight:700;letter-spacing:-.02em}
.rc{background:var(--card);border:1px solid var(--bd);border-radius:20px;overflow:hidden;margin-bottom:14px;box-shadow:var(--ss);transition:box-shadow .3s}
.rc:hover{box-shadow:var(--sm)}
.rh2{width:100%;padding:18px 20px;display:flex;flex-direction:column;gap:8px;text-align:left;cursor:pointer;transition:background .2s;background:var(--card)}
.rh2:hover,.rh2.op{background:var(--cardh)}
.rn{font-family:var(--fd);font-size:19px;font-weight:700;letter-spacing:-.01em;line-height:1.25}
.rm{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.rm span{font-size:11.5px;color:var(--mu)}
.rdg{font-size:10.5px;padding:2px 9px;border-radius:8px;font-weight:600}
.cw{width:100%;margin-top:4px}
.cls{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-bottom:4px}
.cvb{height:4px;background:var(--bgw);border-radius:4px;overflow:hidden}
.cvf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ok),#7BA362);transition:width .6s ease}
.rb{padding:0 20px 20px;animation:fadeUp .25s ease}
.rd{border-top:1px solid var(--bd);padding-top:16px}

.mg{display:flex;gap:10px;padding:14px;background:var(--acp);border-radius:14px;margin-bottom:16px;flex-wrap:wrap}
.mi{flex:1;min-width:55px}
.ml2{font-size:10px;color:var(--mu);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.mv{font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:4px}
.mv span{font-size:10px;font-weight:400;color:var(--mu)}
.mt2{height:3px;background:var(--bgw);border-radius:3px;overflow:hidden}
.mf{height:100%;border-radius:3px;transition:width .6s ease}

.il{display:flex;flex-direction:column;gap:6px}
.irow{display:flex;align-items:baseline;gap:8px;font-size:13.5px}
.idot{color:var(--acl);font-size:6px}
.iamt{color:var(--ac);font-weight:600;min-width:50px;font-size:12.5px}
.slist{display:flex;flex-direction:column;gap:12px}
.stp{display:flex;gap:10px;font-size:13.5px;line-height:1.6}
.sn{min-width:26px;height:26px;border-radius:50%;background:var(--acp2);color:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;margin-top:1px}
.sbt{font-family:var(--fd);font-size:15px;font-weight:700;margin:0 0 10px;text-transform:uppercase;letter-spacing:.04em}

.tbx{padding:12px 14px;border-radius:10px;margin-top:14px;font-size:13px;line-height:1.55;background:var(--okp);border:1px solid rgba(90,114,71,.15);color:var(--ok)}
.sbx{padding:12px 14px;border-radius:10px;margin-top:10px;font-size:13px;line-height:1.55;background:rgba(184,92,56,.06);border:1px solid rgba(184,92,56,.12);color:#A0692E}
.ra{display:flex;gap:8px;margin-top:14px}
.ab{padding:8px 14px;font-size:11.5px;border-radius:10px;font-weight:600;transition:all .2s;background:var(--bgw);color:var(--ac);border:1px solid var(--bd)}
.ab:hover{border-color:var(--bd2);background:var(--acp)}
.ab.sv{background:var(--okp);color:var(--ok);border-color:rgba(90,114,71,.2)}

.mbg{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.mdim{position:absolute;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px)}
.mdl{position:relative;max-width:380px;width:100%;background:var(--card);border-radius:28px;padding:32px 28px;animation:fadeUp .3s ease;z-index:1;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.mdl h3{font-family:var(--fd);font-size:22px;font-weight:700;margin-bottom:6px}
.mdl p{font-size:13px;color:var(--mu);line-height:1.5;margin-bottom:18px}
.mdl input{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:14px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--tx);margin-bottom:14px}
.mdl input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acp)}
.mbt{display:flex;gap:8px}
.mbt button{flex:1;padding:12px;font-size:14px;font-weight:600;border-radius:14px;transition:all .2s}
.msv{background:var(--ac);color:#fff}.msv:hover{background:var(--ach)}
.mcn{background:var(--bgw);color:var(--tx)}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:10px 22px;background:var(--tx);color:var(--bg);border-radius:50px;font-size:13px;font-weight:600;z-index:999;animation:toastIn .3s ease;box-shadow:0 4px 24px rgba(0,0,0,.2)}
.footer{text-align:center;margin-top:36px;padding-top:18px;border-top:1px solid var(--bd);font-size:11.5px;color:var(--mu)}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;color:var(--mu);min-height:300px}
.es .ico{font-size:56px;margin-bottom:16px;opacity:.5}
.es h3{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--tx2);margin-bottom:6px}
.es p{font-size:13.5px;max-width:280px;line-height:1.5}

.ptabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bgw);border-radius:10px;padding:3px}
.ptab{flex:1;padding:8px 4px;font-size:12px;font-weight:600;border-radius:8px;text-align:center;transition:all .2s;color:var(--mu)}
.ptab.on{background:var(--card);color:var(--tx);box-shadow:var(--ss)}
.ptab:hover:not(.on){color:var(--tx2)}
.prov-info{font-size:11.5px;color:var(--mu);line-height:1.5;margin-bottom:12px;padding:10px 12px;background:var(--bgw);border-radius:10px}
.prov-info a{color:var(--ac)}
.prov-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:50px;font-weight:600}
.prov-badge.active{background:var(--okp);color:var(--ok)}
.prov-badge.inactive{background:var(--bgw);color:var(--mu)}

@media(max-width:500px){.header{padding:32px 20px 28px}.header h1{font-size:26px}.main{padding:20px 16px 40px}.cp{padding:7px 11px;font-size:11.5px}.nb{width:36px;height:36px;font-size:13px}.gb{font-size:16px;padding:14px 20px}.rn{font-size:17px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.15s!important}}
</style>
</head>

const PROVIDERS={
  gemini:{name:"Gemini",label:"Gemini Flash",desc:"Free tier from Google AI Studio",url:"https://aistudio.google.com/apikey",keyName:"zwk_gemini"},
  groq:{name:"Groq",label:"Groq (Llama 3.3)",desc:"Free tier from Groq Cloud",url:"https://console.groq.com/keys",keyName:"zwk_groq"},
